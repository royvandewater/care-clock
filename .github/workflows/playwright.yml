name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
    - run: corepack enable
    - id: pnpm-store
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Get installed Playwright version
      id: playwright-version
      run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: pnpm exec playwright install chromium
    - name: Configure .dev.vars
      env:
        GOOGLE_API_CLIENT_EMAIL: ${{ secrets.GOOGLE_API_CLIENT_EMAIL }}
        GOOGLE_API_PRIVATE_KEY: ${{ secrets.GOOGLE_API_PRIVATE_KEY }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: |
        {
          printf 'GOOGLE_API_CLIENT_EMAIL="%s"\n' "$GOOGLE_API_CLIENT_EMAIL"
          printf 'GOOGLE_API_PRIVATE_KEY="%s"\n' "$GOOGLE_API_PRIVATE_KEY"
          printf 'GOOGLE_SHEET_ID="%s"\n' "$GOOGLE_SHEET_ID"
        } > .dev.vars
    - name: Run Playwright tests
      run: pnpm test
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
